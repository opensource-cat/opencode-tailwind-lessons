<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lliçó 1 - Introducció a Tailwind CSS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tabs.js"></script>
  <link rel="stylesheet" href="../tabs.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Lliçó 1: Introducció a Tailwind CSS</h1>
      <p class="text-gray-600 mt-1">Exemples pràctics</p>
    </div>

    <div class="flex flex-wrap gap-1 border-b border-gray-300 mb-6" role="tablist">
      <a href="#cdn"
         onclick="obrirTab(event, 'cdn')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">CDN</a>
      <a href="#boto"
         onclick="obrirTab(event, 'boto')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Botó hover</a>
    </div>

    <section id="cdn" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Instal·lació via CDN</h2>
      <p class="text-sm text-gray-500 mb-4">Pàgina completa amb Tailwind carregat des de la CDN.</p>
      <!-- INICI EXEMPLE CDN -->
      <div class="bg-white border border-gray-200 rounded-xl p-8 flex items-center justify-center min-h-[200px]">
        <h1 class="text-3xl font-bold text-blue-600">Hola, Tailwind!</h1>
      </div>
      <!-- FI EXEMPLE CDN -->
    </section>

    <section id="boto" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Botó pràctic amb hover</h2>
      <p class="text-sm text-gray-500 mb-4">Botó amb classes atòmiques de Tailwind i canvi d'estat en hover.</p>
      <!-- INICI EXEMPLE BOTO -->
      <div class="bg-white border border-gray-200 rounded-xl p-8 flex items-center justify-center min-h-[200px]">
        <button class="bg-blue-600 text-white font-semibold py-2 px-4 rounded hover:bg-blue-700">
          Envia
        </button>
      </div>
      <!-- FI EXEMPLE BOTO -->
    </section>
  </div>


</body>
</html>
