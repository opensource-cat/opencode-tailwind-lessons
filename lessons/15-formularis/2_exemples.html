<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularis amb Tailwind</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../tabs.js"></script>
  <link rel="stylesheet" href="../tabs.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">Formularis amb Tailwind</h1>
      <p class="text-gray-600 mt-1">Exemples pràctics</p>
    </div>

    <div class="flex flex-wrap gap-1 border-b border-gray-300 mb-6" role="tablist">
      <a href="#input-standard"
         onclick="obrirTab(event, 'input-standard')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Input estàndard</a>
      <a href="#botons-form"
         onclick="obrirTab(event, 'botons-form')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Botons</a>
      <a href="#checkbox-radio"
         onclick="obrirTab(event, 'checkbox-radio')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Checkbox/radio</a>
      <a href="#select"
         onclick="obrirTab(event, 'select')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Select</a>
      <a href="#textarea"
         onclick="obrirTab(event, 'textarea')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Textarea</a>
      <a href="#formulari-complet"
         onclick="obrirTab(event, 'formulari-complet')"
         class="tab-btn px-4 py-2.5 text-sm font-medium rounded-t-lg transition-colors bg-gray-200 text-gray-700 hover:text-gray-900">Formulari complet</a>
    </div>

    <section id="input-standard" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Input estàndard</h2>
      <!-- INICI EXEMPLE 1 -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
        <input type="text"
               class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400"
               placeholder="El teu nom">
      </div>
      <!-- FI EXEMPLE 1 -->
    </section>

    <section id="botons-form" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Botons</h2>
      <!-- INICI EXEMPLE 2 -->
      <div class="flex flex-wrap gap-4 items-center">
        <button class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
          Envia
        </button>
        <button class="bg-gray-200 text-gray-800 font-semibold py-2 px-6 rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400">
          Secundari
        </button>
        <button class="bg-red-600 text-white font-semibold py-2 px-6 rounded-lg hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          Perill
        </button>
        <button class="bg-transparent border border-blue-600 text-blue-600 font-semibold py-2 px-6 rounded-lg hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-500">
          Outline
        </button>
      </div>
      <!-- FI EXEMPLE 2 -->
    </section>

    <section id="checkbox-radio" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Checkbox / radio</h2>
      <!-- INICI EXEMPLE 3 -->
      <label class="flex items-center space-x-2">
        <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
        <span class="text-sm text-gray-700">Accepto els termes</span>
      </label>
      <!-- FI EXEMPLE 3 -->
    </section>

    <section id="select" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Select (desplegable)</h2>
      <!-- INICI EXEMPLE 4 -->
      <select class="w-full border border-gray-300 rounded-md px-4 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option>Selecciona una opció</option>
        <option>Opció 1</option>
        <option>Opció 2</option>
      </select>
      <!-- FI EXEMPLE 4 -->
    </section>

    <section id="textarea" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Textarea</h2>
      <!-- INICI EXEMPLE 5 -->
      <textarea class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder:text-gray-400"
                rows="4" placeholder="Escriu aquí..."></textarea>
      <!-- FI EXEMPLE 5 -->
    </section>

    <section id="formulari-complet" class="tab-content bg-white border border-gray-200 rounded-lg p-6 shadow-sm">
      <h2 class="text-xl font-bold text-gray-900 mb-4">Formulari complet + disabled</h2>
      <!-- INICI EXEMPLE 6 -->
      <form class="max-w-lg mx-auto bg-white p-8 shadow-lg rounded-xl space-y-6 border">
        <div>
          <label class="block text-sm font-medium text-gray-700">Nom complet</label>
          <input type="text" class="mt-1 w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Missatge</label>
          <textarea class="mt-1 w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
        </div>
        <button type="submit"
                class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
                disabled>
          Enviar (deshabilitat)
        </button>
      </form>
      <!-- FI EXEMPLE 6 -->
    </section>
  </div>


</body>
</html>
